<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Investor Global Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #070b14;
    color: white;
    display: flex;
}

/* LEFT PANEL */
.sidebar {
    width: 320px;
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(10px);
    padding: 20px;
    border-right: 1px solid rgba(255,255,255,0.08);
}

.title {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 20px;
}

/* KPI cards */
.kpi {
    background: rgba(255,255,255,0.05);
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
}

.kpi h2 {
    margin: 0;
    font-size: 22px;
}

.kpi p {
    margin: 5px 0 0;
    font-size: 12px;
    opacity: 0.7;
}

/* MAP AREA */
.map {
    flex: 1;
    position: relative;
    background: url('https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg');
    background-size: cover;
    background-position: center;
}

/* DARK OVERLAY */
.map::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(0,0,0,0.2), rgba(0,0,0,0.85));
}

/* PIN */
.pin {
    position: absolute;
    width: 10px;
    height: 10px;
    background: #00e5ff;
    border-radius: 50%;
    box-shadow: 0 0 12px #00e5ff;
    cursor: pointer;
    transform: translate(-50%, -50%);
    z-index: 2;
}

.pin::after {
    content: attr(data-info);
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    padding: 5px 8px;
    font-size: 11px;
    border-radius: 6px;
    white-space: nowrap;
    opacity: 0;
    transition: 0.3s;
}

.pin:hover::after {
    opacity: 1;
}

/* GLOW PULSE */
.pin::before {
    content: "";
    position: absolute;
    width: 20px;
    height: 20px;
    background: rgba(0,229,255,0.3);
    border-radius: 50%;
    top: -5px;
    left: -5px;
    animation: pulse 1.8s infinite;
}

@keyframes pulse {
    0% { transform: scale(0.5); opacity: 1; }
    100% { transform: scale(2.5); opacity: 0; }
}

/* TOP BAR */
.topbar {
    position: absolute;
    top: 15px;
    left: 350px;
    right: 20px;
    display: flex;
    justify-content: space-between;
    z-index: 5;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 12px 18px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    font-size: 13px;
}

/* SPARKLINE */
canvas {
    margin-top: 10px;
    width: 100%;
    height: 60px;
}
</style>
</head>

<body>

<div class="sidebar">
    <div class="title">🌍 Investor Dashboard</div>

    <div class="kpi">
        <h2>$48.6M</h2>
        <p>Annual Revenue</p>
    </div>

    <div class="kpi">
        <h2>+27%</h2>
        <p>YoY Growth</p>
    </div>

    <div class="kpi">
        <h2>18</h2>
        <p>Active Countries</p>
    </div>

    <div class="kpi">
        <h2>1.2M</h2>
        <p>Global Users</p>

        <canvas id="chart"></canvas>
    </div>
</div>

<div class="map">

    <div class="topbar">
        <div class="card">📈 Market Status: Strong Growth</div>
        <div class="card">🕒 Live Sync: Active</div>
    </div>

    <!-- Pins -->
    <div class="pin" style="top:40%; left:25%;" data-info="USA - $18M Revenue"></div>
    <div class="pin" style="top:45%; left:50%;" data-info="Europe - $12M Revenue"></div>
    <div class="pin" style="top:55%; left:78%;" data-info="Australia - $8M Revenue"></div>
    <div class="pin" style="top:60%; left:60%;" data-info="Middle East - $10M Revenue"></div>

</div>

<script>
// Simple sparkline chart (no libraries)
const canvas = document.getElementById("chart");
const ctx = canvas.getContext("2d");

canvas.width = 260;
canvas.height = 80;

const data = [10, 20, 15, 30, 28, 40, 55, 50, 65, 70];

ctx.beginPath();
ctx.moveTo(0, 80 - data[0]);

data.forEach((v, i) => {
    ctx.lineTo(i * 30, 80 - v);
});

ctx.strokeStyle = "#00e5ff";
ctx.lineWidth = 2;
ctx.stroke();
</script>

</body>
</html>
